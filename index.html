    <script>
      const THEME_KEY = "concernBracketTheme";

      function setupThemeToggle() {
        const toggle = document.getElementById("themeToggle");
        const toggleText = document.getElementById("themeToggleText");
        const toggleIcon = document.getElementById("themeToggleIcon");

        const setTheme = (theme) => {
          document.documentElement.dataset.theme = theme;
          localStorage.setItem(THEME_KEY, theme);

          const isDark = theme === "dark";
          toggle.setAttribute("aria-pressed", String(isDark));
          toggle.setAttribute(
            "aria-label",
            isDark ? "Switch to light mode" : "Switch to dark mode",
          );
          toggleText.textContent = isDark ? "Dark" : "Light";
          toggleIcon.textContent = isDark ? "☾" : "☀";
        };

        setTheme(localStorage.getItem(THEME_KEY) || "dark");

        toggle.addEventListener("click", () => {
          const currentTheme = document.documentElement.dataset.theme || "dark";
          setTheme(currentTheme === "dark" ? "light" : "dark");
        });
      }

      let activeCategory = "Time";

      const categoryList = document.getElementById("categoryList");
      const categoryTitle = document.getElementById("categoryTitle");
      const categorySummary = document.getElementById("categorySummary");
      const categoryTag = document.getElementById("categoryTag");
      const levelOne = document.getElementById("levelOne");
      const levelTwo = document.getElementById("levelTwo");
      const levelThree = document.getElementById("levelThree");
      const sayText = document.getElementById("sayText");
      const askText = document.getElementById("askText");
      const fitText = document.getElementById("fitText");
      const microText = document.getElementById("microText");

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function makeChoice(item, onClick, isSelected) {
        const btn = document.createElement("button");
        btn.className = "choice" + (isSelected ? " selected" : "");
        btn.title = `Say: ${item.say || ""}\nAsk: ${item.ask || ""}`;
        btn.innerHTML = `<div class="choice-word"><span>${escapeHtml(item.word)}</span><span>›</span></div><p>${escapeHtml(item.summary)}</p>`;
        btn.addEventListener("click", onClick);
        return btn;
      }

      function empty(text) {
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = text;
        return div;
      }

      function renderCategories() {
        categoryList.innerHTML = "";
        document.documentElement.style.setProperty(
          "--category-count",
          Object.keys(data).length,
        );
        Object.entries(data).forEach(([key, cat]) => {
          const btn = document.createElement("button");
          btn.className = "cat-btn" + (key === activeCategory ? " active" : "");
          btn.innerHTML = `<div class="icon ${cat.color}">${cat.icon}</div><div class="word">${key}</div><div class="arrow">›</div>`;
          btn.addEventListener("click", () => {
            activeCategory = key;
            selectedOne = null;
            selectedTwo = null;
            selectedThree = null;
            render();
          });
          categoryList.appendChild(btn);
        });
      }

      function render() {
        renderCategories();
        const cat = data[activeCategory];
        categoryTitle.textContent = activeCategory;
        categorySummary.textContent = "";
        categoryTag.textContent = "";

        levelOne.innerHTML = "";
        cat.levels.forEach((item, index) => {
          levelOne.appendChild(
            makeChoice(
              item,
              () => {
                selectedOne = index;
                selectedTwo = null;
                selectedThree = null;
                render();
              },
              selectedOne === index,
            ),
          );
        });

        levelTwo.innerHTML = "";
        if (selectedOne === null) {
          levelTwo.appendChild(
            empty("Choose a concern to open the next bracket."),
          );
        } else {
          const children = cat.levels[selectedOne].children || [];
          if (!children.length)
            levelTwo.appendChild(empty("No deeper concern needed."));
          children.forEach((item, index) => {
            levelTwo.appendChild(
              makeChoice(
                item,
                () => {
                  selectedTwo = index;
                  selectedThree = null;
                  render();
                },
                selectedTwo === index,
              ),
            );
          });
        }

        levelThree.innerHTML = "";
        if (selectedOne === null) {
          levelThree.appendChild(empty("Choose a concern first."));
        } else if (selectedTwo === null) {
          const item = cat.levels[selectedOne];
          updateScript(item);
          levelThree.appendChild(
            empty("Choose a deeper concern, or use Say / Ask below."),
          );
        } else {
          const item = cat.levels[selectedOne].children[selectedTwo];
          const children = item.children || [];
          updateScript(selectedThree === null ? item : children[selectedThree]);
          if (!children.length) {
            levelThree.appendChild(
              empty("No extra layer needed. Use Say / Ask below."),
            );
          } else {
            children.forEach((child, index) => {
              levelThree.appendChild(
                makeChoice(
                  child,
                  () => {
                    selectedThree = index;
                    updateScript(child);
                    renderLevelThreeSelection(index);
                  },
                  selectedThree === index,
                ),
              );
            });
          }
        }

        if (selectedOne === null) {
          updateScript({
            say: "Start by choosing the client’s biggest concern.",
            ask: "What feels like the biggest issue right now?",
            fit: "Use the bracket to match the concern to the next step.",
            summary: "Choose a category.",
          });
        }
      }

      function renderLevelThreeSelection(index) {
        [...levelThree.querySelectorAll(".choice")].forEach((el, i) => {
          el.classList.toggle("selected", i === index);
        });
      }

      function updateScript(item) {
        sayText.textContent =
          item.say || "Use a calm, simple response that validates the concern.";
        askText.textContent =
          item.ask || "What would be most helpful to solve first?";
        fitText.textContent =
          item.fit || "Match their answer to a simple starter service.";
        microText.textContent = item.summary || "";
      }

      function addConcern(categoryName, concern) {
        const category = data[categoryName];
        if (
          !category ||
          category.levels.some((item) => item.word === concern.word)
        )
          return;
        category.levels.push(concern);
      }
