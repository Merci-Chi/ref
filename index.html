        text-align: left;

        place-items: center;
        border-radius: 11px;
        color: #fff;
        font-weight: 950;
        font-size: clamp(13px, 1.05vw, 16px);

        font-weight: 950;
        font-size: clamp(12px, 1.05vw, 15px);
        color: var(--navy);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .arrow {
        color: #9a8b78;
        font-weight: 900;
      }
      .main {
        min-height: 0;
        display: grid;
        grid-template-rows: 2fr 1fr;
        gap: 10px;
        overflow: hidden;
      }
      .active-category {
        padding: clamp(10px, 1.15vw, 16px);
        display: grid;
        overflow: hidden;
      }
      .category-head,
      .category-head h2,
      .summary,
      .mini-tag {
        display: none !important;
      }
      .bracket {
        min-height: 0;
        height: 100%;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: clamp(8px, 1vw, 14px);
      }

        min-height: 0;
        height: 100%;
        border: 1px solid var(--line);

        padding: clamp(8px, 0.9vw, 12px);

        overflow: hidden;

        letter-spacing: 0.09em;

        align-content: start;
        gap: clamp(5px, 0.62vw, 8px);
        overflow: hidden;

        color: var(--gold);
      }

        align-items: center;

        font-weight: 950;
        color: var(--navy);

        text-overflow: ellipsis;
        white-space: nowrap;
      }

        line-height: 1.15;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        line-clamp: 1;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

        height: 100%;
        min-height: 0;
        display: grid;
        place-items: center;
        border: 1px dashed #d8cdbb;
        border-radius: 16px;
        color: #978977;

        grid-template-columns: 1fr 1fr;
        gap: 10px;

        btn.innerHTML = `<div class="choice-word"><span>${escapeHtml(item.word)}</span><span>›</span></div><p>${escapeHtml(item.summary)}</p>`;
        btn.addEventListener("click", onClick);
        return btn;
      }

      function empty(text) {
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = text;
        return div;
      }

      function renderCategories() {
        categoryList.innerHTML = "";
        document.documentElement.style.setProperty(
          "--category-count",
          Object.keys(data).length,
        );
        Object.entries(data).forEach(([key, cat]) => {
          const btn = document.createElement("button");
          btn.className = "cat-btn" + (key === activeCategory ? " active" : "");
          btn.innerHTML = `<div class="icon ${cat.color}">${cat.icon}</div><div class="word">${key}</div><div class="arrow">›</div>`;
          btn.addEventListener("click", () => {
            activeCategory = key;
            selectedOne = null;
            selectedTwo = null;
            selectedThree = null;
            render();
          });
          categoryList.appendChild(btn);
        });
      }

      function render() {
        renderCategories();
        const cat = data[activeCategory];
        categoryTitle.textContent = activeCategory;
        categorySummary.textContent = "";
        categoryTag.textContent = "";

        levelOne.innerHTML = "";
        cat.levels.forEach((item, index) => {
          levelOne.appendChild(
            makeChoice(
              item,
              () => {
                selectedOne = index;
                selectedTwo = null;
                selectedThree = null;
                render();
              },
              selectedOne === index,
            ),
          );
        });

        levelTwo.innerHTML = "";
        if (selectedOne === null) {
          levelTwo.appendChild(
            empty("Choose a concern to open the next bracket."),
          );
        } else {
          const children = cat.levels[selectedOne].children || [];
          if (!children.length)
            levelTwo.appendChild(empty("No deeper concern needed."));
          children.forEach((item, index) => {
            levelTwo.appendChild(
              makeChoice(
                item,
                () => {
                  selectedTwo = index;
                  selectedThree = null;
                  render();
                },
                selectedTwo === index,
              ),
            );
          });
        }

        levelThree.innerHTML = "";
        if (selectedOne === null) {
          levelThree.appendChild(empty("Choose a concern first."));
        } else if (selectedTwo === null) {
          const item = cat.levels[selectedOne];
          updateScript(item);
          levelThree.appendChild(
            empty("Choose a deeper concern, or use Say / Ask below."),
          );
        } else {
          const item = cat.levels[selectedOne].children[selectedTwo];
          const children = item.children || [];
          updateScript(selectedThree === null ? item : children[selectedThree]);
          if (!children.length) {
            levelThree.appendChild(
              empty("No extra layer needed. Use Say / Ask below."),
            );
          } else {
            children.forEach((child, index) => {
              levelThree.appendChild(
                makeChoice(
                  child,
                  () => {
                    selectedThree = index;
                    updateScript(child);
                    renderLevelThreeSelection(index);
                  },
                  selectedThree === index,
                ),
              );
            });
          }
        }

        if (selectedOne === null) {
          updateScript({
            say: "Start by choosing the client’s biggest concern.",
            ask: "What feels like the biggest issue right now?",
            fit: "Use the bracket to match the concern to the next step.",
            summary: "Choose a category.",
          });
        }
      }

      function renderLevelThreeSelection(index) {
        [...levelThree.querySelectorAll(".choice")].forEach((el, i) => {
          el.classList.toggle("selected", i === index);
        });
      }

      function updateScript(item) {
        sayText.textContent =
          item.say || "Use a calm, simple response that validates the concern.";
        askText.textContent =
          item.ask || "What would be most helpful to solve first?";
        fitText.textContent =
          item.fit || "Match their answer to a simple starter service.";
        microText.textContent = item.summary || "";
      }

      function addConcern(categoryName, concern) {
        const category = data[categoryName];
        if (
          !category ||
          category.levels.some((item) => item.word === concern.word)
        )
          return;
        category.levels.push(concern);
      }

          },
        ];

        Object.values(data).forEach((category) => {
          category.levels.forEach((concern) => {

              if (!deeper.children || !deeper.children.length) {
                deeper.children = moreTemplates.map((template) => ({
                  ...template,
                  say: deeper.say || template.say,
                  ask: deeper.ask || template.ask,
                  fit: deeper.fit || template.fit,
                }));
              }
